<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 你是哪種狗狗？</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(#fff8e7,#ffe0b2);
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:25px;
  padding:30px;
  box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
}

.question{
  margin:40px 0;
  padding:25px;
  background:#fffaf3;
  border:3px solid #ffe0b2;
  border-radius:20px;
}

.question h3{
  margin-bottom:20px;
}

label{
  display:block;
  padding:12px;
  margin:10px 0;
  background:white;
  border-radius:12px;
  cursor:pointer;
}

label:hover{
  background:#fff3e0;
}

button{
  display:block;
  margin:30px auto;
  padding:15px 35px;
  border:none;
  border-radius:30px;
  background:#ff9800;
  color:white;
  font-size:18px;
  cursor:pointer;
}

#result{
  display:none;
  text-align:center;
  margin-top:40px;
  background:#fff8e7;
  padding:25px;
  border-radius:20px;
}

.dog{
  font-size:90px;
}
</style>
</head>
<body>

<div class="container">
  <h1>🐶 你是哪種狗狗？</h1>

  <div id="quiz"></div>

  <button onclick="showResult()">查看結果</button>

  <div id="result">
    <div class="dog">🐶</div>
    <h2 id="dogName"></h2>
    <p id="dogText"></p>
    <button onclick="location.reload()">再測一次</button>
  </div>
</div>

<script>
const dogs = {
  golden:{name:"🐕 黃金獵犬",text:"熱情友善，很喜歡交朋友！"},
  shiba:{name:"🐕 柴犬",text:"獨立、有個性，喜歡自己的步調。"},
  corgi:{name:"🐕 柯基",text:"活潑可愛，是大家的開心果！"},
  husky:{name:"🐕 哈士奇",text:"喜歡冒險，充滿想像力。"},
  border:{name:"🐕 邊境牧羊犬",text:"聰明、有創意。"}
};

const questions = [
{
  q:"1. 如果你突然變成狗狗，你第一件事會做什麼？",
  options:[
    ["🍖 找東西吃","corgi"],
    ["😴 繼續睡覺","shiba"],
    ["🌍 跑出去冒險","husky"],
    ["🐾 找其他狗交朋友","golden"]
  ]
},
{
  q:"2. 如果有一個神秘按鈕，你會？",
  options:[
    ["👀 先研究它","border"],
    ["😆 馬上按下去","husky"],
    ["🙈 不敢按","shiba"],
    ["📞 找朋友一起按","golden"]
  ]
}

// 在這裡繼續加入第 3～15 題
];

const quiz = document.getElementById("quiz");

questions.forEach((item,i)=>{
  let html = `<div class="question"><h3>${item.q}</h3>`;

  item.options.forEach(op=>{
    html += `
      <label>
        <input type="radio" name="q${i}" value="${op[1]}">
        ${op[0]}
      </label>
    `;
  });

  html += "</div>";
  quiz.innerHTML += html;
});

function showResult(){

  const score = {
    golden:0,
    shiba:0,
    corgi:0,
    husky:0,
    border:0
  };

  for(let i=0;i<questions.length;i++){
    const ans =
      document.querySelector(
        `input[name="q${i}"]:checked`
      );

    if(!ans){
      alert("請先回答全部題目！");
      return;
    }

    score[ans.value]++;
  }

  const result =
    Object.keys(score).reduce((a,b)=>
      score[a] > score[b] ? a : b
    );

  document.getElementById("result").style.display =
    "block";

  document.getElementById("dogName").innerText =
    dogs[result].name;

  document.getElementById("dogText").innerText =
    dogs[result].text;
}
</script>

</body>
</html>
