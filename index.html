<!DOCTYPE html>

<style>
body{

}

  max-width:850px;
  margin:auto;
  background:white;

  border-radius:25px;
  box-shadow:0 5px 20px rgba(0,0,0,0.15);
}
h1{text-align:center;color:#d88400;}
.intro{text-align:center;font-size:18px;}
.question{
  margin:25px 0;
  padding:20px;
  background:#fff8ed;
  border-radius:18px;
}
label{
  display:block;
  margin:10px 0;
  cursor:pointer;
}
button{
  display:block;
  margin:30px auto;
  padding:14px 35px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#f0a12b;
  color:white;
  cursor:pointer;
}
button:hover{background:#d88400;}
#result{
  display:none;
  margin-top:30px;
  padding:25px;
  background:#fff0c2;
  border-radius:20px;
}
.rank{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:12px;

</style>
</head>

<body>

<form id="quizForm">
  <div id="quiz"></div>

 ]
},
{

  ["自由自在不被管",{"柴犬":2,"哈士奇":2}],

},

  ["快速找出規則",{"邊境牧羊犬":2,"德國牧羊犬":1}],
  ["到處探索",{"哈士奇":2,"柯基":1}]
 ]
},
{
 q:"11. 你比較像哪一種人？",
 a:[
  ["溫暖型",{"黃金獵犬":2,"拉布拉多":2}],
  ["獨立型",{"柴犬":2,"吉娃娃":1}],

 ]
},

  ["可愛感",{"柯基":2,"博美":1}]
 ]
},
{
 q:"14. 你生氣時通常會？",
 a:[
  ["直接說出來",{"吉娃娃":2,"德國牧羊犬":1}],
  ["先冷處理",{"柴犬":2}],
  ["講道理溝通",{"邊境牧羊犬":2,"拉布拉多":1}],
  ["過一下就算了",{"法國鬥牛犬":2,"柯基":1}]
 ]
},
{
 q:"15. 用一個詞形容你，你會選？",
 a:[

  ["自由",{"哈士奇":2,"柴犬":1}],
  ["聰明",{"邊境牧羊犬":2}],
  ["閃亮",{"博美":2,"柯基":1}]
 ]
}
];

let quizDiv = document.getElementById("quiz");

questions.forEach((item,index)=>{
  let div = document.createElement("div");
  div.className = "question";
  div.innerHTML = `<h3>${item.q}</h3>`;

  item.a.forEach((ans,i)=>{
    div.innerHTML += `
      <label>
        <input type="radio" name="q${index}" value="${index}-${i}">
        ${ans[0]}
      </label>
    `;
  });

  quizDiv.appendChild(div);
});

function showResult(){
  let scores = {};
  for(let dog in dogs){
    scores[dog] = 0;
  }

  for(let i=0;i<questions.length;i++){
    let checked = document.querySelector(`input[name="q${i}"]:checked`);
    if(!checked){
      alert("還有題目沒寫完喔！");
      return;
    }

    let answerIndex = checked.value.split("-")[1];
    let points = questions[i].a[answerIndex][1];

    for(let dog in points){
      scores[dog] += points[dog];
    }
  }

  let ranking = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  let topDog = ranking[0][0];
  let maxScore = ranking[0][1];
  let top3 = ranking.slice(0,3);

  let html = `
    <h2>${dogs[topDog].emoji} 你的狗狗人格是：${topDog}</h2>
    <p>${dogs[topDog].desc}</p>

    <h3>✨ 你的主要特質</h3>
    <ul>
      ${dogs[topDog].traits.map(t=>`<li>${t}</li>`).join("")}
    </ul>

    <h3>💬 代表名言</h3>
    <p><b>「${dogs[topDog].motto}」</b></p>

    <h3>🏆 相似度排行榜</h3>
  `;

  top3.forEach((item,index)=>{
    let percent = Math.round(item[1] / maxScore * 100);
    html += `
      <div class="rank">
        ${index+1}. ${dogs[item[0]].emoji} ${item[0]}：${percent}%
      </div>
    `;
  });

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = html;
  window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
