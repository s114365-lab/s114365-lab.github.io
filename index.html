<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>羽球對戰遊戲</title>
<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    text-align:center;
    font-family:Arial;
}
h1{margin-top:10px;}
canvas{
    background:#1e293b;
    display:block;
    margin:10px auto;
    border:2px solid #334155;
}
#score{
    font-size:20px;
}
button{
    padding:8px 16px;
    margin:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🏸 羽球對戰</h1>
<div id="score">你 0 : 0 電腦</div>
<canvas id="game" width="600" height="300"></canvas>
<br>
<button onclick="reset()">重新開始</button>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let playerY=120;
let aiY=120;

let ball={
x:300,y:150,
vx:4,vy:3,
r:8
};

let scoreP=0;
let scoreAI=0;

function drawCourt(){
ctx.fillStyle="#1e293b";
ctx.fillRect(0,0,c.width,c.height);

ctx.strokeStyle="white";
ctx.beginPath();
ctx.moveTo(300,0);
ctx.lineTo(300,300);
ctx.stroke();
}

function drawRackets(){
ctx.fillStyle="white";
ctx.fillRect(20,playerY,10,60);
ctx.fillRect(570,aiY,10,60);
}

function drawBall(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

function updateAI(){
if(aiY+30<ball.y) aiY+=3;
else aiY-=3;
}

function updateBall(){
ball.x+=ball.vx;
ball.y+=ball.vy;

// 上下牆
if(ball.y<0||ball.y>300) ball.vy*=-1;

// 玩家碰撞
if(ball.x<30 && ball.y>playerY && ball.y<playerY+60){
ball.vx*=-1;
ball.x=30;
}

// AI碰撞
if(ball.x>560 && ball.y>aiY && ball.y<aiY+60){
ball.vx*=-1;
ball.x=560;
}

// 得分
if(ball.x<0){
scoreAI++;
resetBall();
}
if(ball.x>600){
scoreP++;
resetBall();
}

document.getElementById("score").innerText=
`你 ${scoreP} : ${scoreAI} 電腦`;
}

function resetBall(){
ball.x=300;
ball.y=150;
ball.vx*=-1;
ball.vy=3*(Math.random()>0.5?1:-1);
}

function loop(){
drawCourt();
drawRackets();
drawBall();
updateAI();
updateBall();

requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp") playerY-=20;
if(e.key==="ArrowDown") playerY+=20;

if(playerY<0) playerY=0;
if(playerY>240) playerY=240;
});

function reset(){
scoreP=0;
scoreAI=0;
resetBall();
}

loop();
</script>

</body>
</html>
