<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>羽球遊戲升級版</title>
<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    text-align:center;
    font-family:Arial;
}
canvas{
    background:#0f172a;
    display:block;
    margin:10px auto;
    border:2px solid #334155;
}
#score{
    font-size:20px;
}
</style>
</head>
<body>

<h1>🏸 羽球（升級版）</h1>
<div id="score">你 0 : 0 電腦</div>
<canvas id="game" width="600" height="300"></canvas>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let playerY=120;
let aiY=120;

let ball={
x:300,
y:150,
vx:4,
vy:-3,
r:6
};

let p=0,a=0;

function draw(){
ctx.clearRect(0,0,600,300);

// 場地
ctx.fillStyle="#0f172a";
ctx.fillRect(0,0,600,300);

// 網子
ctx.fillStyle="white";
ctx.fillRect(298,0,4,300);

// 球拍
ctx.fillStyle="white";
ctx.fillRect(20,playerY,10,60);
ctx.fillRect(570,aiY,10,60);

// 羽球
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();

document.getElementById("score").innerText=
`你 ${p} : ${a} 電腦`;
}

function updateAI(){
aiY += (ball.y - aiY - 30)*0.08;
}

function updateBall(){

// 重力（羽球下墜感）
ball.vy += 0.12;

ball.x += ball.vx;
ball.y += ball.vy;

// 上下邊界（反彈變弱）
if(ball.y<0){
ball.y=0;
ball.vy*=-0.7;
}
if(ball.y>300){
ball.y=300;
ball.vy*=-0.7;
}

// 玩家擊球（根據打到位置改變角度）
if(ball.x<35 && ball.y>playerY && ball.y<playerY+60){
ball.vx=Math.abs(ball.vx);
ball.vy=(ball.y-(playerY+30))*0.25;
}

// AI擊球
if(ball.x>565 && ball.y>aiY && ball.y<aiY+60){
ball.vx=-Math.abs(ball.vx);
ball.vy=(ball.y-(aiY+30))*0.25;
}

// 得分
if(ball.x<0){
a++;
reset();
}
if(ball.x>600){
p++;
reset();
}
}

function reset(){
ball.x=300;
ball.y=150;
ball.vx*=-1;
ball.vy=-3;
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp") playerY-=20;
if(e.key==="ArrowDown") playerY+=20;

if(playerY<0)playerY=0;
if(playerY>240)playerY=240;
});

function loop(){
draw();
updateAI();
updateBall();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
