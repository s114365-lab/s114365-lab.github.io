<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 你是哪種狗狗？</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#fff7e6,#ffe0b3);
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#ff8c42;
}

.question{
    margin:40px 0;
    padding:25px;
    background:#fffaf3;
    border:3px solid #ffd59e;
    border-radius:20px;
}

.question h3{
    margin-top:0;
    color:#444;
}

label{
    display:block;
    background:white;
    padding:14px;
    margin:12px 0;
    border-radius:15px;
    cursor:pointer;
    transition:0.2s;
}

label:hover{
    background:#fff2dd;
    transform:scale(1.02);
}

button{
    display:block;
    margin:40px auto;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#ff9f43;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ff7f00;
}

#result{
    display:none;
    text-align:center;
    background:#fff8e8;
    border-radius:20px;
    padding:30px;
}

.dog{
    font-size:90px;
}

.progress{
    width:100%;
    height:25px;
    background:#eee;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.bar{
    height:100%;
    width:0%;
    background:#ff9f43;
}
</style>
</head>
<body>

<div class="container">
    <h1>🐶 你是哪種狗狗？ 🐾</h1>

    <div id="quiz"></div>

    <button onclick="showResult()">查看結果</button>

    <div id="result">
        <div class="dog">🐶</div>
        <h2 id="dogName"></h2>
        <p id="dogText"></p>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <p id="percent"></p>

        <button onclick="location.reload()">再測一次</button>
    </div>
</div>

<script>
const dogs = {
    golden:{
        name:"🐕 黃金獵犬",
        text:"你熱情友善，喜歡交朋友，總能帶給大家溫暖！"
    },
    shiba:{
        name:"🐕 柴犬",
        text:"你獨立又有個性，喜歡按照自己的步調生活。"
    },
    corgi:{
        name:"🐕 柯基",
        text:"你活潑又搞笑，是朋友中的開心果！"
    },
    husky:{
        name:"🐕 哈士奇",
        text:"你愛冒險，腦袋裡總有很多天馬行空的想法。"
    },
    border:{
        name:"🐕 邊境牧羊犬",
        text:"你聰明有創意，喜歡學習和挑戰新事物。"
    }
};

const questions = [
{
q:"1. 如果你突然變成狗狗，你第一件事會做什麼？",
options:[
["🍖 找東西吃","corgi"],
["😴 繼續睡覺","shiba"],
["🌍 跑出去冒險","husky"],
["🐾 找其他狗交朋友","golden"]
]},
{
q:"2. 如果有一個神秘按鈕，你會？",
options:[
["👀 先研究它","border"],
["😆 馬上按下去","husky"],
["🙈 完全不敢按","shiba"],
["📞 找朋友一起按","golden"]
]},
{
q:"3. 如果你撿到一個寶箱，你會？",
options:[
["🔑 立刻打開","husky"],
["🤔 猜裡面有什麼","border"],
["👥 找朋友一起開","golden"],
["🏠 帶回家研究","shiba"]
]},
{
q:"4. 如果今天完全沒有作業和考試，你會？",
options:[
["🎮 玩遊戲","corgi"],
["😴 睡到自然醒","shiba"],
["✈️ 出門玩","husky"],
["📚 學新東西","border"]
]},
{
q:"5. 如果你有超能力，你最想要？",
options:[
["🦸 飛行","husky"],
["⏰ 暫停時間","shiba"],
["🚪 瞬間移動","corgi"],
["🧠 讀心術","border"]
]},
{
q:"6. 如果你進入魔法學校，你最想學？",
options:[
["✨ 攻擊魔法","husky"],
["🌿 治癒魔法","golden"],
["🐉 召喚魔法","corgi"],
["🔮 預言魔法","border"]
]},
{
q:"7. 朋友約你去鬼屋，你會？",
options:[
["😆 第一個衝進去","husky"],
["😨 躲在最後面","shiba"],
["📷 負責拍照","border"],
["🤝 抓著朋友一起走","golden"]
]},
{
q:"8. 如果中了100萬，你第一件事是？",
options:[
["🎁 請大家吃東西","golden"],
["✈️ 去旅行","husky"],
["💰 存起來","shiba"],
["🛍️ 買喜歡的東西","corgi"]
]},
{
q:"9. 如果你能養一隻神奇生物，你會選？",
options:[
["🐉 小龍","husky"],
["🦄 獨角獸","golden"],
["🧚 小精靈","corgi"],
["🐺 狼","shiba"]
]},
{
q:"10. 如果明天不用上課，你最想去哪裡？",
options:[
["🏖️ 海邊","golden"],
["🎡 遊樂園","corgi"],
["🏔️ 山上","husky"],
["🏠 待在家","shiba"]
]},
{
q:"11. 如果你是一種天氣，你會是？",
options:[
["☀️ 大晴天","golden"],
["🌧️ 小雨","shiba"],
["❄️ 下雪","border"],
["🌈 彩虹","corgi"]
]},
{
q:"12. 如果可以和一種動物聊天，你最想跟誰聊？",
options:[
["🐶 狗狗","golden"],
["🐱 貓咪","shiba"],
["🐧 企鵝","border"],
["🐬 海豚","husky"]
]},
{
q:"13. 如果你是老師，你最想教什麼？",
options:[
["🎨 美術","border"],
["🏃 體育","corgi"],
["🔬 科學","husky"],
["🎵 音樂","golden"]
]},
{
q:"14. 如果有一扇任意門，你第一個想去哪裡？",
options:[
["🚀 外太空","husky"],
["🏰 魔法城堡","corgi"],
["🌊 海底世界","border"],
["🦖 恐龍時代","golden"]
]},
{
q:"15. 如果有一台時光機，你第一個想去哪裡？",
options:[
["🦖 恐龍時代","husky"],
["🏰 中世紀城堡","corgi"],
["🚀 未來世界","border"],
["👶 回到小時候的一天","golden"]
]}
];

const quiz = document.getElementById("quiz");

questions.forEach((item,i)=>{
    let html = `<div class="question"><h3>${item.q}</h3>`;

    item.options.forEach(op=>{
        html += `
        <label>
            <input type="radio"
                   name="q${i}"
                   value="${op[1]}">
            ${op[0]}
        </label>`;
    });

    html += "</div>";
    quiz.innerHTML += html;
});

function showResult(){

    const score = {
        golden:0,
        shiba:0,
        corgi:0,
        husky:0,
        border:0
    };

    for(let i=0;i<questions.length;i++){
        const ans =
        document.querySelector(`input[name="q${i}"]:checked`);

        if(!ans){
            alert("請先回答所有題目！");
            return;
        }

        score[ans.value]++;
    }

    const result =
        Object.keys(score).reduce((a,b)=>
            score[a] > score[b] ? a : b
        );

    const percent =
        Math.round(score[result] / questions.length * 100);

    document.getElementById("result").style.display = "block";
    document.getElementById("dogName").innerText =
        dogs[result].name;
    document.getElementById("dogText").innerText =
        dogs[result].text;
    document.getElementById("percent").innerText =
        `你和 ${dogs[result].name} 的相似度：${percent}%`;
    document.getElementById("bar").style.width =
        percent + "%";

    document.getElementById("result")
        .scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
