<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>貪吃蛇網站</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
h1{margin-top:20px;}
canvas{
    background:#222;
    margin-top:10px;
    border:2px solid #444;
}
#score{
    margin-top:10px;
    font-size:20px;
}
button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🐍 貪吃蛇網站</h1>
<div id="score">分數：0</div>
<canvas id="game" width="400" height="400"></canvas>
<br>
<button onclick="resetGame()">重新開始</button>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const grid=20;
let score=0;

let snake, food, count;

function init(){
snake={
x:160,y:160,
dx:grid,dy:0,
cells:[],
max:4
};

food={
x:Math.floor(Math.random()*20)*grid,
y:Math.floor(Math.random()*20)*grid
};

count=0;
score=0;
document.getElementById("score").innerText="分數：0";
}

function loop(){
requestAnimationFrame(loop);
if(++count<6)return;
count=0;

ctx.clearRect(0,0,400,400);

snake.x+=snake.dx;
snake.y+=snake.dy;

// 撞牆
if(snake.x<0||snake.y<0||snake.x>=400||snake.y>=400){
init();
}

snake.cells.unshift({x:snake.x,y:snake.y});
if(snake.cells.length>snake.max)snake.cells.pop();

// 食物
ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,grid-1,grid-1);

if(snake.x===food.x&&snake.y===food.y){
snake.max++;
score+=10;
document.getElementById("score").innerText="分數："+score;
food.x=Math.floor(Math.random()*20)*grid;
food.y=Math.floor(Math.random()*20)*grid;
}

// 蛇
ctx.fillStyle="lime";
snake.cells.forEach((c,i)=>{
ctx.fillRect(c.x,c.y,grid-1,grid-1);

// 咬到自己
for(let j=i+1;j<snake.cells.length;j++){
if(c.x===snake.cells[j].x&&c.y===snake.cells[j].y){
init();
}
}
});
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft"&&snake.dx===0){snake.dx=-grid;snake.dy=0;}
if(e.key==="ArrowUp"&&snake.dy===0){snake.dx=0;snake.dy=-grid;}
if(e.key==="ArrowRight"&&snake.dx===0){snake.dx=grid;snake.dy=0;}
if(e.key==="ArrowDown"&&snake.dy===0){snake.dx=0;snake.dy=grid;}
});

function resetGame(){init();}

init();
loop();
</script>

</body>
</html>
