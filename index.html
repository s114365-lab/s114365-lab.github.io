<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>麵條逃跑記</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#fff8dc;
    font-family:Arial;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    background:#ffe4b5;
}

#player{
    width:50px;
    height:50px;
    position:absolute;
    left:100px;
    top:300px;
    font-size:45px;
}

.enemy{
    width:50px;
    height:50px;
    position:absolute;
    font-size:40px;
}

#score{
    position:absolute;
    top:20px;
    left:20px;
    font-size:30px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="game">
    <div id="score">分數：0</div>
    <div id="player">🍜</div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreText = document.getElementById("score");

let x = 100;
let y = 300;
let vy = 0;
let score = 0;
let gameOver = false;

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(e.key === "ArrowUp" && y >= 300){
        vy = -15;
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

function createEnemy(){
    const enemy = document.createElement("div");
    enemy.className = "enemy";

    const types = ["🥢","🍴","🍲"];
    enemy.textContent =
        types[Math.floor(Math.random()*types.length)];

    enemy.style.left = window.innerWidth + "px";
    enemy.style.top = "300px";

    game.appendChild(enemy);

    let ex = window.innerWidth;

    const move = setInterval(()=>{
        if(gameOver){
            clearInterval(move);
            return;
        }

        ex -= 6;
        enemy.style.left = ex + "px";

        const px = x;
        const py = y;

        if(
            ex < px + 40 &&
            ex + 40 > px &&
            py > 250
        ){
            gameOver = true;
            alert("遊戲結束！分數：" + score);
            location.reload();
        }

        if(ex < -50){
            clearInterval(move);
            enemy.remove();
            score++;
            scoreText.innerText =
                "分數：" + score;
        }
    },20);
}

setInterval(()=>{
    if(!gameOver){
        createEnemy();
    }
},1500);

function update(){
    if(gameOver) return;

    if(keys["ArrowLeft"]){
        x -= 7;
    }

    if(keys["ArrowRight"]){
        x += 7;
    }

    vy += 0.8;
    y += vy;

    if(y > 300){
        y = 300;
        vy = 0;
    }

    player.style.left = x + "px";
    player.style.top = y + "px";

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
